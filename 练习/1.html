<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原生Todo · 增删改</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .todo-app {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            padding: 24px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 24px;
            color: #1e293b;
        }
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }
        .todo-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e9eef2;
        }
        .todo-item:last-child {
            border-bottom: none;
        }
        .todo-check {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3b82f6;
        }
        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #0f172a;
            word-break: break-word;
        }
        .completed .todo-text {
            text-decoration: line-through;
            color: #94a3b8;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 14px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 20px;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background: #fee2e2;
        }
        .stats {
            background: #f8fafc;
            border-radius: 40px;
            padding: 12px 16px;
            margin: 20px 0 24px 0;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
        }
        .add-section {
            display: flex;
            gap: 8px;
        }
        .add-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .add-input:focus {
            border-color: #3b82f6;
        }
        .save-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .save-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="todo-app">
        <h1> React Todo</h1>  <!-- 保留原图标题风格 -->

        <!-- 待办列表容器 -->
        <ul class="todo-list" id="todoList"></ul>

        <!-- 统计区域 -->
        <div class="stats" id="stats">
            <span id="completedCount">0</span>已完成 / <span id="totalCount">3</span>总数
        </div>

        <!-- 新增任务区域 -->
        <div class="add-section">
            <input type="text" class="add-input" id="newTaskInput" placeholder="你想做点什么" autocomplete="off">
            <button class="save-btn" id="saveTaskBtn">Save Task</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 初始数据（符合截图示例）----------
            let todos = [
                { id: '1', text: '睡觉', completed: false },
                { id: '2', text: '打豆豆', completed: false },
                { id: '3', text: 'test', completed: false }
            ];

            // DOM 元素
            const todoListEl = document.getElementById('todoList');
            const completedSpan = document.getElementById('completedCount');
            const totalSpan = document.getElementById('totalCount');
            const newInput = document.getElementById('newTaskInput');
            const saveBtn = document.getElementById('saveTaskBtn');

            // 辅助函数：生成简短唯一ID（仅用于示例）
            function generateId() {
                return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            }

            // 渲染整个列表 + 更新统计
            function render() {
                // 清空列表
                todoListEl.innerHTML = '';

                // 遍历 todos 生成 DOM
                todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = 'todo-item' + (todo.completed ? ' completed' : '');
                    li.dataset.id = todo.id;  // 存id方便后续事件处理

                    // 复选框
                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.className = 'todo-check';
                    chk.checked = todo.completed;
                    // 使用 change 事件切换完成状态
                    chk.addEventListener('change', (e) => {
                        todo.completed = e.target.checked;
                        // 重新渲染当前项（也可直接更新类，但为了统一重新渲染列表）
                        render();
                    });

                    // 文本
                    const span = document.createElement('span');
                    span.className = 'todo-text';
                    span.textContent = todo.text;

                    // 删除按钮
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.textContent = '删除';
                    delBtn.addEventListener('click', () => {
                        // 过滤掉当前id
                        todos = todos.filter(t => t.id !== todo.id);
                        render();
                    });

                    li.appendChild(chk);
                    li.appendChild(span);
                    li.appendChild(delBtn);
                    todoListEl.appendChild(li);
                });

                // 更新统计
                const completed = todos.filter(t => t.completed).length;
                const total = todos.length;
                completedSpan.textContent = completed;
                totalSpan.textContent = total;
            }

            // 添加新任务
            function addNewTask() {
                const text = newInput.value.trim();
                if (text === '') {
                    alert('任务内容不能为空');
                    return;
                }
                const newTodo = {
                    id: generateId(),
                    text: text,
                    completed: false
                };
                todos.push(newTodo);
                render();
                newInput.value = '';  // 清空输入框
                newInput.focus();
            }

            // 绑定保存按钮事件
            saveBtn.addEventListener('click', addNewTask);
            // 支持回车添加
            newInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addNewTask();
                }
            });

            // 初始化渲染
            render();
        })();
    </script>
</body>
</html>
